<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOLD Management</title>
  
  <link rel="icon" href="bold-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="bold-logo.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      line-height: 1.6;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* ==================== NAV ==================== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo img {
      height: 42px;
      width: auto;
      transition: transform 0.4s ease;
    }

    .logo img:hover { transform: scale(1.08); }

    .nav-links {
      display: none;
      gap: 35px;
      font-weight: 500;
    }

    .nav-links a {
      color: #ddd;
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: white; }

    /* Hamburger */
    .hamburger {
      display: block;
      cursor: pointer;
      z-index: 1001;
    }

    .hamburger span {
      display: block;
      width: 28px;
      height: 3px;
      background: white;
      margin: 6px 0;
      transition: 0.4s;
      border-radius: 3px;
    }

    /* Mobile Menu */
    .mobile-menu {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      font-size: 28px;
      z-index: 999;
    }

    .mobile-menu.active { display: flex; }

    /* ==================== HERO & CARDS (wie zuvor) ==================== */
    .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr; align-items: center; padding: 120px 5% 80px; gap: 60px; text-align: center; }
    @media (min-width: 900px) { .hero { grid-template-columns: 1fr 1fr; text-align: left; padding: 0 6%; } }

    .hero-text h1 { font-size: clamp(42px, 8vw, 78px); line-height: 1.05; letter-spacing: -2.5px; font-weight: 800; }
    .hero-text p { font-size: clamp(17px, 4vw, 20px); color: #bbb; margin: 28px auto 40px; max-width: 520px; }

    .btn-primary, .btn-secondary {
      padding: 16px 32px; border-radius: 999px; font-weight: 700; text-decoration: none;
      display: inline-block; margin: 8px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-primary { background: white; color: black; }
    .btn-primary:hover { transform: translateY(-4px) scale(1.05); }
    .btn-secondary { background: transparent; color: white; border: 1px solid #555; }

    .card {
      background: #111; border: 1px solid #222; border-radius: 20px; padding: 32px 28px;
      transition: all 0.5s; opacity: 0; transform: translateY(30px);
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover { transform: translateY(-12px); border-color: #666; }

    .container { max-width: 1280px; margin: 0 auto; padding: 100px 5% 80px; }
    h2 { font-size: clamp(32px, 6vw, 46px); font-weight: 800; letter-spacing: -2px; margin-bottom: 60px; text-align: center; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <img src="bold-logo.png" alt="BOLD Management">
    </div>
    
    <div class="nav-links">
      <a href="#leistungen">Leistungen</a>
      <a href="#prozess">So arbeiten wir</a>
      <a href="#creator">Für Creator</a>
      <a href="#kontakt">Kontakt</a>
    </div>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#leistungen">Leistungen</a>
    <a href="#prozess">So arbeiten wir</a>
    <a href="#creator">Für Creator</a>
    <a href="#kontakt">Kontakt</a>
  </div>

  <!-- Dein Hero und Rest der Seite hier einfügen... -->

  <script>
    // Hamburger Menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('active');
      
      // Animation für Hamburger zu X
      const spans = hamburger.querySelectorAll('span');
      spans.forEach((span, index) => {
        if (mobileMenu.classList.contains('active')) {
          if (index === 0) span.style.transform = 'rotate(45deg) translate(5px, 5px)';
          if (index === 1) span.style.opacity = '0';
          if (index === 2) span.style.transform = 'rotate(-45deg) translate(7px, -6px)';
        } else {
          span.style.transform = 'none';
          span.style.opacity = '1';
        }
      });
    });

    // Card Animation
    const cards = document.querySelectorAll('.card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    cards.forEach(card => observer.observe(card));
  </script>

</body>
</html>
