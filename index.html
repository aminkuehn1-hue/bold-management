<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOLD Management</title>
  
  <link rel="icon" href="bold-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="bold-logo.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Smooth Scroll */
    html { scroll-behavior: smooth; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
      padding: 18px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo img {
      height: 42px;
      width: auto;
      transition: transform 0.4s ease;
    }

    .logo img:hover {
      transform: scale(1.08);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      padding: 120px 5% 80px;
      gap: 60px;
      text-align: center;
    }

    @media (min-width: 900px) {
      .hero { grid-template-columns: 1fr 1fr; text-align: left; padding: 0 6%; gap: 60px; }
    }

    .hero-text h1 {
      font-size: clamp(42px, 8vw, 78px);
      line-height: 1.05;
      letter-spacing: -2.5px;
      font-weight: 800;
      opacity: 0;
      animation: fadeUp 1s forwards 0.3s;
    }

    .hero-text p {
      font-size: clamp(17px, 4vw, 20px);
      color: #bbb;
      margin: 28px auto 40px;
      max-width: 520px;
      opacity: 0;
      animation: fadeUp 1s forwards 0.6s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-primary, .btn-secondary {
      padding: 16px 32px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      margin: 8px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-primary:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 20px 40px rgba(255,255,255,0.2);
    }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid #555;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-3px);
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 32px 28px;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateY(30px);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-12px);
      border-color: #666;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 100px 5% 80px; }

    h2 {
      font-size: clamp(32px, 6vw, 46px);
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 60px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <img src="bold-logo.png" alt="BOLD Management">
    </div>
  </nav>

  <!-- Der Rest deiner Seite (Hero, Leistungen, Prozess etc.) bleibt gleich -->
  <!-- Füge einfach die Klasse "card" bei allen Karten hinzu und den Scroll-Trigger unten -->

  <script>
    // Intersection Observer für Scroll-Animationen
    const cards = document.querySelectorAll('.card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    cards.forEach(card => observer.observe(card));
  </script>

</body>
</html>
